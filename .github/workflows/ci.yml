name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --all
      - name: Build
        run: cargo build --release

  # Bindings freshness gate (D-07). Regenerate ui/src/bindings.ts from the
  # shared make_builder() and fail if the committed file is stale. Runs on
  # macos-latest because gen-bindings links `tauri` (system WKWebView), avoiding
  # the Linux webkit2gtk dev deps. No npm/vite needed — pure cargo (Q-A/Q-B).
  #
  # The committed bindings.ts is an INTENTIONAL Wave-3 partial snapshot:
  # get_status returns Result<StatusReport, String> (TomeError lands in 25-05).
  # 25-05 Task 2 regenerates + re-commits bindings.ts once TomeError enters the
  # boundary, so this gate stays green on every committed state.
  bindings:
    name: Bindings freshness
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Regenerate bindings
        run: cargo run -p tome-desktop --bin gen-bindings
      - name: Fail if bindings.ts is stale
        run: git diff --exit-code -- crates/tome-desktop/ui/src/bindings.ts

  # Build the tome-desktop Tauri crate on macOS (Xcode CLT + system WKWebView;
  # no frontend/npm build — bare `cargo build` does not consult frontendDist).
  # A full `cargo tauri build` (.app + vite) is deferred to Phase 31.
  desktop-build:
    name: Desktop build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build tome-desktop
        run: cargo build -p tome-desktop

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  typos:
    name: Typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@v1

  machete:
    name: Unused dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-machete
        run: cargo install cargo-machete
      - name: Check unused dependencies
        run: cargo machete

  # semver check disabled — tome is a CLI binary, not published to crates.io,
  # so there is no baseline to compare against. Re-enable if the crate is ever
  # published as a library.
