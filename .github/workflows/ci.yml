name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # `tome-desktop` is a macOS-only Tauri crate (D-GUI-06, mirrored by the
        # macOS-only `desktop-build`, `bindings`, and `a11y` jobs below). On
        # ubuntu it would pull glib-sys / webkit2gtk-sys system libs that aren't
        # installed — and even if they were, the resulting build would exercise
        # a render path the project doesn't ship. Excluding it from the ubuntu
        # slice keeps coverage where it matters without paying the GTK3 tax.
        include:
          - os: ubuntu-latest
            scope: --workspace --exclude tome-desktop
          - os: macos-latest
            scope: --workspace
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy ${{ matrix.scope }} --all-targets -- -D warnings
      - name: Test
        run: cargo test ${{ matrix.scope }}
      - name: Build
        run: cargo build ${{ matrix.scope }} --release

  # Bindings freshness gate (D-07). Regenerate ui/src/bindings.ts from the
  # shared make_builder() and fail if the committed file is stale. Runs on
  # macos-latest because gen-bindings links `tauri` (system WKWebView), avoiding
  # the Linux webkit2gtk dev deps. No npm/vite needed — pure cargo (Q-A/Q-B).
  #
  # The committed bindings.ts is an INTENTIONAL Wave-3 partial snapshot:
  # get_status returns Result<StatusReport, String> (TomeError lands in 25-05).
  # 25-05 Task 2 regenerates + re-commits bindings.ts once TomeError enters the
  # boundary, so this gate stays green on every committed state.
  bindings:
    name: Bindings freshness
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Regenerate bindings
        run: cargo run -p tome-desktop --bin gen-bindings
      - name: Fail if bindings.ts is stale
        run: git diff --exit-code -- crates/tome-desktop/ui/src/bindings.ts

  # Build the tome-desktop Tauri crate on macOS (Xcode CLT + system WKWebView;
  # no frontend/npm build — bare `cargo build` does not consult frontendDist).
  # A full `cargo tauri build` (.app + vite) is deferred to Phase 31.
  desktop-build:
    name: Desktop build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build tome-desktop
        run: cargo build -p tome-desktop

  # axe-core/playwright a11y gate (Phase 26 plan 26-07, NF-02).
  # Scans Status / Skills / Health / PreviewPopover for WCAG-AA
  # violations against the mocked-Tauri Vite bundle. macOS-only — the
  # Phase-26 GUI is macOS-only per D-GUI-06; running this on Linux
  # would test irrelevant render paths. The first `playwright install`
  # downloads ~150MB; the `Swatinem/rust-cache@v2`-style npm cache
  # below keeps the dependency cache between runs.
  a11y:
    name: A11y gate (axe-core)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: crates/tome-desktop/ui/package-lock.json
      - name: Install npm deps
        run: npm ci
        working-directory: crates/tome-desktop/ui
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: crates/tome-desktop/ui
      - name: Run axe-core gate
        run: npm run test:a11y
        working-directory: crates/tome-desktop/ui

  # Bindings freshness gate (D-07). Regenerate ui/src/bindings.ts from the
  # shared make_builder() and fail if the committed file is stale. Runs on
  # macos-latest because gen-bindings links `tauri` (system WKWebView), avoiding
  # the Linux webkit2gtk dev deps. No npm/vite needed — pure cargo (Q-A/Q-B).
  #
  # The committed bindings.ts is an INTENTIONAL Wave-3 partial snapshot:
  # get_status returns Result<StatusReport, String> (TomeError lands in 25-05).
  # 25-05 Task 2 regenerates + re-commits bindings.ts once TomeError enters the
  # boundary, so this gate stays green on every committed state.
  bindings:
    name: Bindings freshness
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Regenerate bindings
        run: cargo run -p tome-desktop --bin gen-bindings
      - name: Fail if bindings.ts is stale
        run: git diff --exit-code -- crates/tome-desktop/ui/src/bindings.ts

  # Build the tome-desktop Tauri crate on macOS (Xcode CLT + system WKWebView;
  # no frontend/npm build — bare `cargo build` does not consult frontendDist).
  # A full `cargo tauri build` (.app + vite) is deferred to Phase 31.
  desktop-build:
    name: Desktop build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build tome-desktop
        run: cargo build -p tome-desktop

  # axe-core/playwright a11y gate (Phase 26 plan 26-07, NF-02).
  # Scans Status / Skills / Health / PreviewPopover for WCAG-AA
  # violations against the mocked-Tauri Vite bundle. macOS-only — the
  # Phase-26 GUI is macOS-only per D-GUI-06; running this on Linux
  # would test irrelevant render paths. The first `playwright install`
  # downloads ~150MB; the `Swatinem/rust-cache@v2`-style npm cache
  # below keeps the dependency cache between runs.
  a11y:
    name: A11y gate (axe-core)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: crates/tome-desktop/ui/package-lock.json
      - name: Install npm deps
        run: npm ci
        working-directory: crates/tome-desktop/ui
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: crates/tome-desktop/ui
      - name: Run axe-core gate
        run: npm run test:a11y
        working-directory: crates/tome-desktop/ui

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2

  typos:
    name: Typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: crate-ci/typos@v1

  machete:
    name: Unused dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-machete
        run: cargo install cargo-machete
      - name: Check unused dependencies
        run: cargo machete

  # semver check disabled — tome is a CLI binary, not published to crates.io,
  # so there is no baseline to compare against. Re-enable if the crate is ever
  # published as a library.
