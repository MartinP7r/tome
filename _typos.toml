[files]
extend-exclude = [
  # Vendored mdbook-mermaid assets — minified JS with short identifiers
  # (`Ue`, `Tpe`, `bve`, etc.) that typos flags as misspellings.
  "mermaid.min.js",
  "mermaid-init.js",
]

[default.extend-words]
ratatui = "ratatui"
Invokable = "Invokable"
# `mis-classified` (hyphenated compound) appears intentionally in the
# foreign-symlink detection doc-comment — typos suggests `mis` → `miss`/`mist`
# but the hyphen is part of the compound modifier.
mis = "mis"
# `fo` is a deliberate fuzzy-search fixture token in browse snapshot tests
# (the test asserts that `fo` matches `foo-bar`); typos suggests `of` / `for`
# / etc.
fo = "fo"
